kind = "web"
previewPath = "/"
title = "Third Eye Gallery"
version = "1.0.0"
id = "artifacts/third-eye-gallery"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
localPort = 20462
name = "web"
paths = ["/"]

[services.development]
run = "pnpm --filter @workspace/third-eye-gallery run dev"

[services.env]
PORT = "20462"
BASE_PATH = "/"

[services.production]
build = ["pnpm", "--filter", "@workspace/third-eye-gallery", "run", "build"]
publicDir = "artifacts/third-eye-gallery/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"
