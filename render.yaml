services:
  - type: web
    name: third-eye-gallery
    env: static
    buildCommand: corepack enable && corepack prepare pnpm@10.32.1 --activate && pnpm install --frozen-lockfile && pnpm --filter @workspace/third-eye-gallery run build
    staticPublishPath: artifacts/third-eye-gallery/dist/public
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
